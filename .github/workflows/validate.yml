name: Validate & test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Typecheck, test, build, package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
      - name: Build (esbuild bundle)
        run: npm run build
      - name: Package dry-run (vsce)
        run: npx vsce package --no-dependencies
